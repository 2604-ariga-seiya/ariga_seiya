<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <link th:href="@{/css/style.css}" rel="styleSheet">
    <title>新規タスク</title>
</head>
<body>
<div class="header-contents">
    <h2>新規タスク</h2>
</div>
<div class="main-contents">
    <form method="post" action="/add" th:object="${formModel}">
        <div th:if="${#fields.hasErrors('content')}"
             th:errors="*{content}" style="color: red; font-weight: bold; margin-top: 5px;">
        </div>
        <div th:if="${#fields.hasErrors('limitDate')}"
             th:errors="*{limitDate}" style="color: red; font-weight: bold; margin-top: 5px;">
        </div>
        <div class="form-area">
            <input type="hidden" th:field="*{id}">
            <label>タスク内容</label><br>
            <textarea class="task-box" th:field="*{content}" size="20" maxlength="200" ></textarea><br/>
            <label>タスク期限</label><br>
            <input type="date" class="task-limitDate-box" th:field="*{limitDate}"><br>
            <input type="submit" value="追加" />
        </div>
    </form>
</div>
<div class="footer-contents">
    <a href="/">戻る</a>
</div>
</body>
</html>
